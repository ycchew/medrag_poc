server {
    listen       80;
    server_name  localhost;

    # Docker DNS resolver with short cache for dynamic resolution
    resolver 127.0.0.11 valid=5s;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Disable cache for index.html to ensure fresh loads
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # proxy API endpoints to backend
    location = /dashboard {
        return 301 /dashboard/;
    }
    location /dashboard/ {
        set $backend_backend http://backend:8000;
        proxy_pass   $backend_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /chat {
        set $backend_chat http://backend:8000;
        proxy_pass   $backend_chat/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /classify {
        set $backend_classify http://backend:8000;
        proxy_pass   $backend_classify/classify;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rag {
        set $backend_rag http://backend:8000;
        proxy_pass   $backend_rag/rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /sql-query {
        set $backend_sql http://backend:8000;
        proxy_pass   $backend_sql/sql-query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /history {
        set $backend_history http://backend:8000;
        proxy_pass   $backend_history/history;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
